name: Electrolyte Solutions ERP Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        # We pull to the defa ult  workspace first to prep the files
      
      - name: Sync Files to E Drive
        run: |
          # /MIR: Mirrors the directory (deletes files in F: that were deleted in Git)
          # /XD: Excludes folders we don't want to overwridte (like .git or existing node_modules)
          # We target the specific agent folder inside your ArisServer
          robocopy . "F:\ElectrolyteSolutions\frontend" /MIR /XD .git .github node_modules
          
          # Robocopy uses non-zero exit  codes for success (e.g., 1 means files were copied).
          # We force 'exis 0' so GitHub Actions doesn't think a successful copy is a "Failure".
          if ($lastExitCode -le 8) { exit 0 } else { exit $lastExitCode }
        shell: powershell
