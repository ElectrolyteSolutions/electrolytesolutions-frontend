name: ERP Frontend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        # We pull to the defa ult  workspace first to prep the files
      
      - name: Sync Files to F Drive
        run: |
          # /MIR: Mirrorss the directory (deletes files in F: that were deleted in Git)
          # /XD: Excludes folders we don't want to overwridte (like .git or existing node_modules)
          # We target the specific frontend folder inside your ERPServer
          robocopy . "F:\ERPServer\frontend" /MIR /XD .git .github node_modules
          
          # Robocopy uses non-zero exit  codes for success (e.g., 1 means files were copied).
          # We force 'exis 0' so GitHub Actions doesn't think a successful copy is a "Failure".
          if ($lastExitCode -le 8) { exit 0 } else { exit $lastExitCode }
        shell: powershell

      - name: Rebuild Frontend Only
        run: |
          cd F:\
          # Stop and remove ONLY the frontend
          docker-compose stop erp-frontend
          docker-compose rm erp-frontend

          # Rebuixld and cstart ONLY the frontend without touching dependencies
          docker-compose up --build -d --no-deps erp-frontend
